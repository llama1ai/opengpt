<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Inteligentny asystent AI - rozmowy, analiza, pomoc" />
    
    <!-- iOS PWA Meta Tags - KLUCZOWE dla ukrycia paska Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AI Assistant" />
    <meta name="apple-touch-fullscreen" content="yes" />
    
    <!-- Android PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="AI Assistant" />
    
    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-config" content="none" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>AI Assistant</title>
    
    <style>
      /* Prevent zoom on input focus */
      @media screen and (max-width: 768px) {
        input, textarea, select {
          font-size: 16px !important;
        }
      }
      
      /* Base App Styles */
      html, body, #root {
        height: 100vh;
        height: 100dvh;
        width: 100vw;
        margin: 0;
        padding: 0;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }
      
      /* iOS Safari Address Bar Hide */
      @supports (-webkit-touch-callout: none) {
        html, body, #root {
          height: -webkit-fill-available;
          min-height: -webkit-fill-available;
        }
      }
      
      /* PWA Standalone Mode - iOS */
      @media all and (display-mode: standalone) {
        body {
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
          -webkit-user-select: none;
          user-select: none;
          -webkit-touch-callout: none;
          -webkit-tap-highlight-color: transparent;
        }
        
        /* Allow text selection in content areas */
        textarea, input, [contenteditable], .prose {
          -webkit-user-select: text;
          user-select: text;
        }
        
        /* Hide scrollbars in PWA mode */
        ::-webkit-scrollbar {
          display: none;
        }
        
        * {
          scrollbar-width: none;
          -ms-overflow-style: none;
        }
      }
      
      /* Prevent pull-to-refresh and overscroll */
      body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        touch-action: manipulation;
      }
      
      /* Hide browser UI elements */
      .browser-only {
        display: none !important;
      }
      
      /* iOS specific fixes */
      @supports (-webkit-appearance: none) {
        body {
          -webkit-user-select: none;
          -webkit-touch-callout: none;
          -webkit-tap-highlight-color: transparent;
        }
      }
    </style>
  </head>
  <body>
    <noscript>Musisz włączyć JavaScript, aby uruchomić tę aplikację.</noscript>
    
    <div id="root"></div>
    
    <script>
      // iOS Safari Address Bar Management
      let isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      let isStandalone = window.navigator.standalone === true || 
                        window.matchMedia('(display-mode: standalone)').matches ||
                        document.referrer.includes('android-app://');
      
      console.log('🔍 Device detection:', { isIOS, isStandalone });
      
      if (isStandalone) {
        console.log('✅ Running as PWA in standalone mode');
        document.body.classList.add('pwa-standalone');
      } else {
        console.log('⚠️ Running in browser mode');
        
        // For iOS Safari - try to hide address bar
        if (isIOS) {
          console.log('📱 iOS detected - attempting to hide address bar');
          
          // Method 1: Scroll to hide address bar
          function hideAddressBar() {
            setTimeout(() => {
              window.scrollTo(0, 1);
              setTimeout(() => {
                window.scrollTo(0, 0);
              }, 100);
            }, 500);
          }
          
          // Method 2: Use viewport height adjustment
          function adjustViewport() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
            
            // Force layout recalculation
            document.body.style.height = `${window.innerHeight}px`;
            document.getElementById('root').style.height = `${window.innerHeight}px`;
          }
          
          // Method 3: Request fullscreen on user interaction
          function requestFullscreen() {
            if (document.documentElement.requestFullscreen) {
              document.documentElement.requestFullscreen().catch(err => {
                console.log('Fullscreen request failed:', err);
              });
            } else if (document.documentElement.webkitRequestFullscreen) {
              document.documentElement.webkitRequestFullscreen();
            }
          }
          
          // Apply methods
          hideAddressBar();
          adjustViewport();
          
          // Reapply on orientation change
          window.addEventListener('orientationchange', () => {
            setTimeout(() => {
              hideAddressBar();
              adjustViewport();
            }, 500);
          });
          
          // Reapply on resize
          window.addEventListener('resize', adjustViewport);
          
          // Try fullscreen on first touch
          let hasInteracted = false;
          document.addEventListener('touchstart', () => {
            if (!hasInteracted) {
              hasInteracted = true;
              requestFullscreen();
            }
          }, { once: true });
          
          // Show install instructions for iOS
          setTimeout(() => {
            if (!isStandalone) {
              console.log('💡 Showing iOS install hint');
              // You can add a subtle hint here about adding to home screen
            }
          }, 3000);
        }
      }
      
      // Prevent browser navigation behaviors
      if (isStandalone || isIOS) {
        // Disable back button
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', function(event) {
          history.pushState(null, null, location.href);
        });
        
        // Disable refresh shortcuts
        document.addEventListener('keydown', function(e) {
          if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
            e.preventDefault();
          }
        });
        
        // Prevent context menu
        document.addEventListener('contextmenu', (e) => {
          e.preventDefault();
        });
        
        // Prevent zoom gestures
        document.addEventListener('gesturestart', (e) => {
          e.preventDefault();
        });
        
        // Prevent multi-touch
        document.addEventListener('touchstart', (e) => {
          if (e.touches.length > 1) {
            e.preventDefault();
          }
        });
      }
      
      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(registration) {
              console.log('✅ ServiceWorker registered successfully');
            })
            .catch(function(err) {
              console.log('❌ ServiceWorker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
